<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="600" viewBox="0 0 1000 600">
  <rect width="1000" height="600" fill="#f5f7fb"/>
  <style>
    .box { fill:#ffffff; stroke:#4a6572; stroke-width:2; rx:16; }
    .header { fill:#ffffff; font: bold 16px Arial, sans-serif; }
    .header-blue { fill:#2c3e50; }
    .header-purple { fill:#5d4b9b; }
    .header-green { fill:#2a7f62; }
    .header-teal { fill:#3c7f99; }
    .attr { font: 14px Arial, sans-serif; fill:#2c3e50; }
    .pk { font: bold 14px Arial, sans-serif; fill:#2b6cb0; }
    .fk { font: bold 14px Arial, sans-serif; fill:#d97706; }
    .line { stroke:#4a6572; stroke-width:2; }
    .arrow { fill:#4a6572; }
    .label { font: 13px Arial, sans-serif; fill:#4a6572; }
    .card { font: bold 13px Arial, sans-serif; fill:#4a6572; }
    .row-bg { fill:#eef4fb; }
    .row-bg-alt { fill:#ffffff; }
  </style>

  <!-- CLIENTE -->
  <rect class="box" x="60" y="60" width="240" height="190"/>
  <rect class="box header-blue" x="60" y="60" width="240" height="40" rx="16"/>
  <text class="header" x="180" y="86" text-anchor="middle">CLIENTE</text>
  <rect class="row-bg" x="60" y="105" width="240" height="24"/>
  <text class="pk" x="80" y="122">PK DNI</text>
  <rect class="row-bg-alt" x="60" y="129" width="240" height="24"/>
  <text class="attr" x="80" y="146">nombre</text>
  <rect class="row-bg" x="60" y="153" width="240" height="24"/>
  <text class="attr" x="80" y="170">direccion</text>
  <rect class="row-bg-alt" x="60" y="177" width="240" height="24"/>
  <text class="attr" x="80" y="194">fecha_nacimiento</text>

  <!-- ASUNTO -->
  <rect class="box" x="380" y="60" width="240" height="210"/>
  <rect class="box header-purple" x="380" y="60" width="240" height="40" rx="16"/>
  <text class="header" x="500" y="86" text-anchor="middle">ASUNTO</text>
  <rect class="row-bg" x="380" y="105" width="240" height="24"/>
  <text class="pk" x="400" y="122">PK num_expediente</text>
  <rect class="row-bg-alt" x="380" y="129" width="240" height="24"/>
  <text class="attr" x="400" y="146">fecha_inicio</text>
  <rect class="row-bg" x="380" y="153" width="240" height="24"/>
  <text class="attr" x="400" y="170">fecha_fin</text>
  <rect class="row-bg-alt" x="380" y="177" width="240" height="24"/>
  <text class="attr" x="400" y="194">estado</text>
  <rect class="row-bg" x="380" y="201" width="240" height="24"/>
  <text class="fk" x="400" y="218">FK DNI_cliente</text>

  <!-- PROCURADOR -->
  <rect class="box" x="700" y="60" width="240" height="190"/>
  <rect class="box header-green" x="700" y="60" width="240" height="40" rx="16"/>
  <text class="header" x="820" y="86" text-anchor="middle">PROCURADOR</text>
  <rect class="row-bg" x="700" y="105" width="240" height="24"/>
  <text class="pk" x="720" y="122">PK DNI</text>
  <rect class="row-bg-alt" x="700" y="129" width="240" height="24"/>
  <text class="attr" x="720" y="146">nombre</text>
  <rect class="row-bg" x="700" y="153" width="240" height="24"/>
  <text class="attr" x="720" y="170">apellidos</text>
  <rect class="row-bg-alt" x="700" y="177" width="240" height="24"/>
  <text class="attr" x="720" y="194">num_colegiado</text>
  <rect class="row-bg" x="700" y="201" width="240" height="24"/>
  <text class="attr" x="720" y="218">casos_ganados</text>

  <!-- ASUNTO_PROCURADOR -->
  <rect class="box" x="360" y="330" width="280" height="170"/>
  <rect class="box header-teal" x="360" y="330" width="280" height="40" rx="16"/>
  <text class="header" x="500" y="356" text-anchor="middle">ASUNTO_PROCURADOR</text>
  <rect class="row-bg" x="360" y="375" width="280" height="24"/>
  <text class="fk" x="380" y="392">FK num_expediente</text>
  <rect class="row-bg-alt" x="360" y="401" width="280" height="24"/>
  <text class="fk" x="380" y="418">FK DNI_procurador</text>
  <rect class="row-bg" x="360" y="427" width="280" height="24"/>
  <text class="pk" x="380" y="444">PK compuesta (num_exp, DNI_proc)</text>

  <!-- Relación CLIENTE - ASUNTO -->
  <line class="line" x1="290" y1="132" x2="380" y2="132"/>
  <polygon class="arrow" points="380,128 390,132 380,136"/>
  <text class="label" x="330" y="118">tiene</text>
  <text class="card" x="290" y="110">1</text>
  <text class="card" x="375" y="110">N</text>

  <!-- Relación ASUNTO - ASUNTO_PROCURADOR -->
  <line class="line" x1="500" y1="270" x2="500" y2="330"/>
  <polygon class="arrow" points="496,330 500,340 504,330"/>
  <text class="card" x="510" y="300">N</text>
  <text class="card" x="490" y="300">N</text>

  <!-- Relación PROCURADOR - ASUNTO_PROCURADOR -->
  <line class="line" x1="820" y1="250" x2="820" y2="330"/>
  <line class="line" x1="820" y1="330" x2="640" y2="330"/>
  <polygon class="arrow" points="640,326 650,330 640,334"/>
  <text class="label" x="760" y="265">gestiona</text>
  <text class="card" x="830" y="285">N</text>
  <text class="card" x="655" y="285">N</text>
</svg>